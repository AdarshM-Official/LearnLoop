{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .quiz-card { border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: none; }
    .option-btn { 
        transition: all 0.2s; 
        border: 2px solid #e9ecef; 
        border-radius: 10px; 
        font-weight: 500;
    }
    .option-btn:hover { 
        border-color: #0d6efd; 
        background-color: #f0f7ff; 
        transform: translateY(-2px); 
    }
    .progress { border-radius: 10px; background-color: #e9ecef; }
    .career-card { transition: 0.3s; cursor: pointer; border: 2px solid transparent; }
    .career-card:hover { border-color: #0d6efd; transform: scale(1.03); }
</style>

<div class="container py-5">
    <div id="quiz-container" class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="mb-2 text-center fw-bold">Career Path Discovery</h2>
            <p class="text-center text-muted mb-4">Answer these 30 simple questions to find your IT match.</p>
            
            <div class="progress mb-4" style="height: 12px;">
                <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-primary" style="width: 0%;"></div>
            </div>

            <div id="question-area" class="animate__animated animate__fadeIn">
                </div>
        </div>
    </div>

    <div id="result-area" class="d-none animate__animated animate__fadeIn">
        <h2 class="text-center mb-4 fw-bold">Your Career Path Analysis</h2>
        <div id="fit-message" class="alert alert-warning d-none text-center shadow-sm"></div>
        
        <div class="row g-4 justify-content-center" id="career-cards">
            </div>

        <div id="detail-section" class="mt-5 p-5 border-0 shadow-lg rounded-4 bg-white d-none animate__animated animate__slideInUp">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 id="selected-title" class="text-primary fw-bold mb-0"></h3>
                <span class="badge bg-primary px-3 py-2">Top Match</span>
            </div>
            <p id="selected-desc" class="fs-5 text-secondary mb-4"></p>
            <hr>
            <h5 class="fw-bold mb-4">Step-by-Step Learning Roadmap:</h5>
            <div id="selected-roadmap-container" class="list-group list-group-flush">
                </div>
        </div>
    </div>
</div>

<script>
const questions = [
    { q: "In a group setting, which role do you naturally fall into?", options: ["The Leader (Organizing people)", "The Specialist (Doing my own specific task)"] },
    { q: "How do you prefer your workday to look?", options: ["Steady and predictable", "Full of new, unexpected challenges"] },
    { q: "If your TV remote stops working, what's your first move?", options: ["Open the battery cover and investigate", "Call someone who knows how to fix it"] },
    { q: "When someone gives you feedback on your work, how do you take it?", options: ["I value the advice to improve", "I feel a bit demotivated or defensive"] },
    { q: "Do you enjoy explaining how things work to your friends?", options: ["Yes, I love teaching", "No, I'd rather just do it myself"] },
    { q: "When looking at a map, what do you notice first?", options: ["The whole route (The big picture)", "The specific street names (The details)"] },
    { q: "Which environment helps you think better?", options: ["A quiet, focused room", "A lively place with people around"] },
    { q: "How do you feel about following a strict set of rules?", options: ["I find comfort in clear rules", "I prefer the freedom to experiment"] },
    { q: "Does a 1,000-piece jigsaw puzzle sound like...", options: ["A fun weekend challenge", "A total headache"] },
    { q: "If you're stuck on a difficult riddle for hours, do you...", options: ["Keep trying until I crack it", "Walk away and try something else"] },
    { q: "When you use a messy website, what's your reaction?", options: ["'I could design this much better'", "'I just want to get my task done'"] },
    { q: "Which sounds more satisfying to you?", options: ["Hunting for a tiny error in a document", "Brainstorming a brand new idea"] },
    { q: "In a video game (or movie), would you rather be...", options: ["The Architect (Building the base)", "The Guardian (Defending the system)"] },
    { q: "Do you enjoy looking at charts and finding hidden trends?", options: ["Yes, I like numbers and patterns", "No, charts are boring to me"] },
    { q: "Would you rather spend your day...", options: ["Talking to people", "Working with tools or software"] },
    { q: "Do you like keeping a diary or writing instructions for things?", options: ["Yes, I like documenting things", "No, I'm not a fan of writing"] },
    { q: "Does a 'fast-paced' environment where plans change hourly sound...", options: ["Exciting and energetic", "Stressful and chaotic"] },
    { q: "Are you curious about the 'Why' behind a computer's behavior?", options: ["Always! I want to know why", "Not really, as long as it works"] },
    { q: "Which part of a magazine do you look at first?", options: ["The photos and colors (Visuals)", "The articles and facts (Information)"] },
    { q: "Does the idea of working 'behind the scenes' appeal to you?", options: ["Yes, I don't need the spotlight", "No, I like my work to be visible"] },
    { q: "How do you feel about sitting at a desk for most of the day?", options: ["I'm totally fine with it", "I get restless and need to move"] },
    { q: "When you get a new phone, do you...", options: ["Go through every single setting", "Just use the basic apps I need"] },
    { q: "Are you okay with a job where you must study and learn every single year?", options: ["Yes, I love learning", "No, I want to learn once and be done"] },
    { q: "If your computer is slow, do you...", options: ["Try to find which app is causing it", "Restart and hope for the best"] },
    { q: "What is your main goal for a career?", options: ["High salary and stability", "Creativity and passion"] },
    { q: "Do you enjoy organizing your physical space (closet, desk)?", options: ["Yes, everything has a place", "No, I'm a bit more messy"] },
    { q: "Can you focus on one task for a long time without getting bored?", options: ["Yes, I have deep focus", "No, I need constant variety"] },
    { q: "When you hear 'Coding', what do you think?", options: ["Solving a secret puzzle", "Typing gibberish on a black screen"] },
    { q: "Are you comfortable using English for 100% of your work?", options: ["Yes, absolutely", "I'd prefer my local language"] },
    { q: "Do you like helping people solve their tech problems?", options: ["Yes, it's rewarding", "No, it's very frustrating"] }
];

let currentStep = 0;
let responses = [];

function showQuestion() {
    const qArea = document.getElementById('question-area');
    const item = questions[currentStep];
    
    qArea.innerHTML = `
        <div class="card p-4 p-md-5 quiz-card animate__animated animate__fadeIn">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <span class="badge bg-light text-primary border px-3 py-2">Question ${currentStep + 1} of ${questions.length}</span>
            </div>
            <h4 class="mb-5 fw-bold text-dark text-center">${item.q}</h4>
            <div class="row g-3">
                <div class="col-12">
                    <button type="button" class="btn option-btn btn-lg w-100 text-start p-3" onclick="saveAnswer('${item.options[0]}')">
                        <span class="text-primary me-2">A.</span> ${item.options[0]}
                    </button>
                </div>
                <div class="col-12">
                    <button type="button" class="btn option-btn btn-lg w-100 text-start p-3" onclick="saveAnswer('${item.options[1]}')">
                        <span class="text-primary me-2">B.</span> ${item.options[1]}
                    </button>
                </div>
            </div>
        </div>
    `;
    updateProgress();
}

function saveAnswer(ans) {
    // FIXED: Correctly saving the text version of the question and the answer
    responses.push({
        question: questions[currentStep].q,
        answer: ans
    });

    if (currentStep < questions.length - 1) {
        currentStep++;
        showQuestion();
    } else {
        processSubmission();
    }
}

function updateProgress() {
    const percent = ((currentStep) / questions.length) * 100;
    document.getElementById('progress-bar').style.width = percent + '%';
}

async function processSubmission() {
    const qArea = document.getElementById('question-area');
    qArea.innerHTML = `
        <div class="text-center py-5 card quiz-card animate__animated animate__pulse animate__infinite">
            <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;"></div>
            <h4>Our AI is analyzing your profile...</h4>
            <p class="text-muted">Calculating the best-fit IT roles based on your character.</p>
        </div>
    `;

    try {
        const response = await fetch('', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
            body: JSON.stringify({responses: responses})
        });
        
        const data = await response.json();
        displayResults(data);
    } catch (error) {
        qArea.innerHTML = `<div class="alert alert-danger">Error processing your request. Please try again.</div>`;
    }
}

function displayResults(data) {
    document.getElementById('quiz-container').classList.add('d-none');
    document.getElementById('result-area').classList.remove('d-none');
    
    if (data.is_fit === false || data.status === "unfit") {
        document.getElementById('fit-message').classList.remove('d-none');
        document.getElementById('fit-message').innerText = "Our analysis suggests your strengths might be better suited for non-IT fields like Public Relations, Healthcare, or Trade Industries.";
        return;
    }

    const cardsHtml = data.careers.map((career) => `
        <div class="col-md-4">
            <div class="card h-100 career-card quiz-card" onclick='showDetails(${JSON.stringify(career)})'>
                <div class="card-body text-center p-4">
                    <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:50px; height:50px;">
                        <i class="fas fa-briefcase"></i>
                    </div>
                    <h5 class="card-title fw-bold text-dark">${career.title}</h5>
                    <p class="small text-muted mb-0">Click to view roadmap</p>
                </div>
            </div>
        </div>
    `).join('');
    
    document.getElementById('career-cards').innerHTML = cardsHtml;
}

function showDetails(career) {
    document.getElementById('detail-section').classList.remove('d-none');
    document.getElementById('selected-title').innerText = career.title;
    document.getElementById('selected-desc').innerText = career.description;
    
    const roadmapContainer = document.getElementById('selected-roadmap-container');
    roadmapContainer.innerHTML = career.roadmap.map((step, index) => `
        <div class="list-group-item border-0 d-flex align-items-start mb-2">
            <span class="badge bg-primary rounded-pill me-3 mt-1">${index + 1}</span>
            <div class="fw-semibold text-dark">${step}</div>
        </div>
    `).join('');
    
    document.getElementById('detail-section').scrollIntoView({ behavior: 'smooth' });
}

// Start the quiz
showQuestion();
</script>

{% endblock %}
