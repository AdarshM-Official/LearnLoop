<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Alignment Results</title>
<link href="https://fonts.googleapis.com/css2?family=Baskervville&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    :root {
        --gold: #c5a059;
        --gold-light: #e2cfab;
        --slate: #1a1c1e;
        --slate-light: #2d3135;
        --white: #ffffff;
        --bg: #f4f5f7;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        min-height: 100vh;
        background-color: var(--bg);
        background-image: 
            radial-gradient(circle at top left, rgba(197, 160, 89, 0.08) 0%, transparent 40%),
            radial-gradient(circle at bottom right, rgba(26, 28, 30, 0.05) 0%, transparent 40%);
        font-family: 'Inter', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--slate);
        overflow-x: hidden;
    }

    /* --- ANIMATIONS --- */
    @keyframes revealUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes goldShimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
    }

    /* --- CONTAINER --- */
    .result-container {
        width: 90%;
        max-width: 700px;
        text-align: center;
        animation: revealUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    header { margin-bottom: 3rem; }
    header span { 
        text-transform: uppercase; 
        letter-spacing: 4px; 
        font-size: 0.75rem; 
        color: var(--gold); 
        font-weight: 600;
        display: block;
        margin-bottom: 1rem;
    }
    header h1 { 
        font-family: 'Baskervville', serif; 
        font-size: 2.5rem; 
        margin: 0; 
        font-weight: 400;
        color: var(--slate);
    }

    /* --- RESULT CARD --- */
    .career-insight-card {
        background: var(--white);
        padding: 4rem 2rem;
        border-radius: 2px;
        box-shadow: 0 30px 60px rgba(0,0,0,0.05);
        position: relative;
        border-top: 4px solid var(--gold);
        margin-bottom: 3rem;
    }

    .career-insight-card::after {
        content: "";
        position: absolute;
        inset: 10px;
        border: 1px solid rgba(197, 160, 89, 0.2);
        pointer-events: none;
    }

    .icon-seal {
        width: 60px;
        height: 60px;
        margin: 0 auto 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--gold-light);
        border-radius: 50%;
        color: var(--gold);
    }

    .career-title {
        font-family: 'Baskervville', serif;
        font-size: 3.5rem;
        color: var(--slate);
        margin: 0;
        line-height: 1.1;
        background: linear-gradient(90deg, #1a1c1e, #c5a059, #1a1c1e);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: goldShimmer 4s linear infinite;
    }

    .subtitle {
        margin-top: 1.5rem;
        font-size: 0.95rem;
        color: #777;
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
        line-height: 1.6;
    }

    /* --- ACTION FOOTER --- */
    .button-group {
        display: flex;
        gap: 1.5rem;
        justify-content: center;
        align-items: center;
    }

    .btn-primary {
        background: var(--slate);
        color: var(--white);
        text-decoration: none;
        padding: 1.2rem 2.5rem;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: 600;
        transition: all 0.3s ease;
        border: 1px solid var(--slate);
    }

    .btn-primary:hover {
        background: var(--gold);
        border-color: var(--gold);
        transform: translateY(-2px);
    }

    .btn-secondary {
        background: transparent;
        color: var(--slate-light);
        text-decoration: none;
        padding: 1.2rem 2.5rem;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: 600;
        transition: all 0.3s ease;
        border: 1px solid rgba(0,0,0,0.1);
    }

    .btn-secondary:hover {
        border-color: var(--slate);
        color: var(--slate);
    }

    /* Decorative Report Number */
    .report-id {
        position: absolute;
        bottom: 2rem;
        right: 2rem;
        font-size: 0.65rem;
        font-family: monospace;
        color: #ccc;
        letter-spacing: 1px;
    }

    @media (max-width: 600px) {
        .career-title { font-size: 2.2rem; }
        .button-group { flex-direction: column; width: 100%; }
        .btn-primary, .btn-secondary { width: 100%; text-align: center; }
    }
</style>
</head>
<body>

<div class="result-container">
    <header>
        <span>Analysis Complete</span>
        <h1>Your Professional Destiny</h1>
    </header>

    <div class="career-insight-card">
        <div class="icon-seal">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 256 256">
                <path d="M224,128a96,96,0,1,1-96-96A96,96,0,0,1,224,128Z" opacity="0.1"></path>
                <path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm45.66-93.66a8,8,0,0,1,0,11.32l-32,32a8,8,0,0,1-11.32-11.32L148.69,136H88a8,8,0,0,1,0-16h60.69l-18.35-18.34a8,8,0,0,1,11.32-11.32Z"></path>
            </svg>
        </div>

        <h3 class="career-title">{{ career }}</h3>
        
        <p class="subtitle">
            This path perfectly aligns with your cognitive strengths, professional temperament, and decision-making style as identified in your assessment.
        </p>

        <div class="report-id">REF_ID: #XP-{{ career|slice:":3"|upper }}-2026</div>
    </div>

    <div class="button-group">
        <a href="{% url 'career_predict' %}" class="btn-primary">
            Retake Assessment
        </a>
        <a href="#" onclick="window.print(); return false;" class="btn-secondary">
            Download Report
        </a>
    </div>
</div>

</body>
</html>
